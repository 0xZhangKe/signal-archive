name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - site/**
      - scripts/build_pages.py
      - tests/test_build_pages.py
      - .github/workflows/deploy-pages.yml
  repository_dispatch:
    types:
      - archive_updated
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: signal-archive-writer
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Check out archive
        uses: actions/checkout@v6
        with:
          ref: archive
          path: archive-data

      - name: Test Pages builder
        run: python3 -m unittest discover -s tests -v

      - name: Build Pages artifact
        run: |
          python3 scripts/build_pages.py \
            --catalog archive-data/catalog.json \
            --archive-root archive-data \
            --site-root site \
            --output _site

      - name: Sync rendered data to archive
        shell: bash
        run: |
          set -euo pipefail
          cp _site/data/rendered.json archive-data/rendered.json
          mkdir -p archive-data/categories archive-data/articles
          rsync -a --delete _site/data/categories/ archive-data/categories/
          rsync -a --delete _site/data/articles/ archive-data/articles/

          git -C archive-data add -A -- rendered.json categories articles
          if git -C archive-data diff --cached --quiet; then
            echo "Rendered data is already up to date."
            exit 0
          fi

          git -C archive-data config user.name "github-actions[bot]"
          git -C archive-data config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C archive-data commit -m "archive: render Pages data"
          git -C archive-data push origin HEAD:archive

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
