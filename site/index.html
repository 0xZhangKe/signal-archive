<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="description" content="A reading room for continuously archived RSS and AI feeds">
    <title>Signal Archive</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="mobile-tabs" role="navigation" aria-label="Reading areas">
      <button class="mobile-tab is-active" data-panel="catalog">Catalog</button>
      <button class="mobile-tab" data-panel="list">Articles</button>
      <button class="mobile-tab" data-panel="reader">Reader</button>
    </div>

    <main class="archive-desk" data-mobile-panel="catalog">
      <aside class="catalog-panel" aria-label="Content catalog">
        <header class="brand-plate">
          <span class="brand-mark">SA</span>
          <div>
            <h1>Signal Archive</h1>
            <p>Feed reading room</p>
          </div>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false" title="Switch to dark mode">
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 15.2A8.4 8.4 0 0 1 8.8 4a8.4 8.4 0 1 0 11.2 11.2Z"></path>
            </svg>
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="3.5"></circle>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.65 6.35l1.42-1.42"></path>
            </svg>
          </button>
        </header>
        <div class="catalog-caption">
          <span>CATALOG · 001</span>
          <span id="source-count">LOADING</span>
        </div>
        <nav id="catalog" class="catalog-tree" aria-label="Feed catalog"></nav>
        <footer class="cabinet-footer">
          <span class="status-lamp" aria-hidden="true"></span>
          <span id="archive-status">Preparing archive…</span>
        </footer>
      </aside>

      <div class="column-resizer" data-resizer="left" role="separator" aria-label="Resize catalog and article columns" aria-orientation="vertical" tabindex="0"></div>

      <section class="list-panel" aria-label="Article list">
        <header class="list-header">
          <div>
            <h2>
              <span id="list-title">Select a category</span>
              <a id="list-source-link" class="list-source-link" target="_blank" rel="noopener noreferrer" hidden></a>
            </h2>
            <span id="article-count" class="count-stamp">0 ITEMS</span>
          </div>
        </header>
        <div id="article-list" class="article-list" aria-live="polite">
          <div class="empty-state">
            <span class="empty-symbol">⌁</span>
            <p>Select a category or source from the catalog.</p>
          </div>
        </div>
        <button id="load-more" class="load-more" type="button" hidden>Load more</button>
      </section>

      <div class="column-resizer" data-resizer="middle" role="separator" aria-label="Resize article and reader columns" aria-orientation="vertical" tabindex="0"></div>

      <article class="reader-panel" aria-label="Article reader">
        <div id="reader-empty" class="reader-empty">
          <div class="paper-emblem">S·A</div>
          <p class="eyebrow">ARCHIVE READING ROOM</p>
          <h2>Select an article to begin</h2>
          <p>The selected article will open here on a quiet sheet of paper.</p>
        </div>
        <div id="reader-content" class="reader-content" hidden>
          <header class="article-header">
            <p id="reader-source" class="source-label"></p>
            <h2 id="reader-title"></h2>
            <div class="article-meta">
              <time id="reader-date"></time>
              <a id="reader-link" target="_blank" rel="noopener noreferrer">Read original ↗</a>
            </div>
          </header>
          <div id="reader-body" class="article-body"></div>
        </div>
      </article>
    </main>

    <template id="placeholder-template">
      <div class="image-placeholder" aria-hidden="true">
        <span>SA</span>
        <i></i>
      </div>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
